<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastFood Menu</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <header>
        <h1>🍔 FastFood Menu</h1>
        <button id="adminBtn" onclick="showAdmin()">Admin</button>
    </header>

    <div id="menu">
        <h2>Burgers</h2>
        <div class="menu-section">
            <div class="card">
                <img src="https://via.placeholder.com/150" alt="Burger">
                <h3>Burger</h3>
                <p>25000 so'm</p>
                <button onclick="addToCart('Burger', 25000)">Qo'shish</button>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/150" alt="Cheese Burger">
                <h3>Cheese Burger</h3>
                <p>30000 so'm</p>
                <button onclick="addToCart('Cheese Burger', 30000)">Qo'shish</button>
            </div>
        </div>

        <h2>Lavash</h2>
        <div class="menu-section">
            <div class="card">
                <img src="https://via.placeholder.com/150" alt="Lavash">
                <h3>Lavash</h3>
                <p>30000 so'm</p>
                <button onclick="addToCart('Lavash', 30000)">Qo'shish</button>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/150" alt="Chicken Lavash">
                <h3>Chicken Lavash</h3>
                <p>35000 so'm</p>
                <button onclick="addToCart('Chicken Lavash', 35000)">Qo'shish</button>
            </div>
        </div>

        <h2>Ichimliklar</h2>
        <div class="menu-section">
            <div class="card">
                <img src="https://via.placeholder.com/150" alt="Coca Cola">
                <h3>Coca Cola</h3>
                <p>10000 so'm</p>
                <button onclick="addToCart('Coca Cola', 10000)">Qo'shish</button>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/150" alt="Pepsi">
                <h3>Pepsi</h3>
                <p>10000 so'm</p>
                <button onclick="addToCart('Pepsi', 10000)">Qo'shish</button>
            </div>
        </div>
    </div>

    <div id="cart">
        <h2>Savat</h2>
        <ul id="cartItems"></ul>
        <p id="total">Jami: 0 so'm</p>
        <button onclick="sendOrder()">Buyurtma berish</button>
    </div>

    <div id="adminPanel" style="display:none;">
        <h2>Admin Panel</h2>
        <input type="password" id="adminPass" placeholder="Parol">
        <button onclick="loginAdmin()">Kirish</button>
        <div id="adminContent" style="display:none;">
            <input type="text" id="newItemName" placeholder="Mahsulot nomi">
            <input type="number" id="newItemPrice" placeholder="Narx">
            <select id="newItemCategory">
                <option value="Burgers">Burgers</option>
                <option value="Lavash">Lavash</option>
                <option value="Ichimliklar">Ichimliklar</option>
            </select>
            <button onclick="addNewItem()">Qo'shish</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
